<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>书源管理</title>
    <style id="theme-vars">
:root {
  /* === Color System === */
  --color-primary: #2E7D5B;
  --color-primary-light: #E8F5EE;
  --color-text-primary: #2D2D2D;
  --color-text-secondary: #666666;
  --color-text-tertiary: #999999;
  --color-text-placeholder: #B2B2B2;
  --color-bg-page: #F5F5F5;
  --color-bg-card: #FFFFFF;
  --color-border: #EDEDED;

  /* Reading theme backgrounds */
  --reading-bg-default: #F6F2E9;
  --reading-text-default: #3E3B32;
  --reading-bg-white: #FFFFFF;
  --reading-text-white: #2D2D2D;
  --reading-bg-green: #CCE8CF;
  --reading-text-green: #2D5A32;
  --reading-bg-dark: #1A1A1A;
  --reading-text-dark: #999999;
  --reading-bg-parchment: #F0E6D3;
  --reading-text-parchment: #5C4B32;

  /* Functional colors */
  --state-error: #E74C3C;
  --state-warning: #F39C12;
  --state-success: #27AE60;

  /* === Typography === */
  --font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", "Microsoft YaHei", sans-serif;
  --font-size-display: 20px;
  --font-size-h1: 17px;
  --font-size-h2: 15px;
  --font-size-body: 14px;
  --font-size-caption: 12px;
  --font-size-reading: 18px;
  --line-height-display: 28px;
  --line-height-h1: 24px;
  --line-height-h2: 22px;
  --line-height-body: 20px;
  --line-height-caption: 17px;
  --line-height-reading: 1.75;
  --font-weight-medium: 500;
  --font-weight-regular: 400;

  /* === Spacing === */
  --space-xs: 4px;
  --space-sm: 8px;
  --space-md: 12px;
  --space-lg: 16px;
  --space-xl: 24px;
  --space-xxl: 32px;

  /* === Border Radius === */
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-full: 50%;

  /* === Shadows === */
  --shadow-card: 0 2px 8px rgba(0, 0, 0, 0.08);
  --shadow-float: 0 4px 16px rgba(0, 0, 0, 0.12);
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-primary: var(--color-primary);
    --color-border: var(--color-border);
  }
  @layer base {
    body { background: var(--color-background); color: var(--color-text-primary); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen antialiased" style="font-family: var(--font-family); background: var(--color-bg-page); color: var(--color-text-primary); max-width: 375px; margin: 0 auto;">

    <!-- Navigation Bar -->
    <nav style="height: 44px; display: flex; align-items: center; padding: 0 var(--space-lg); position: sticky; top: 0; background: var(--color-bg-card); z-index: 10;">
        <!-- Back button -->
        <button data-dom-id="source-back" style="display: flex; align-items: center; background: none; border: none; cursor: pointer; padding: 4px; margin-left: -4px; color: var(--color-text-primary);" aria-label="返回">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="13,4 7,10 13,16"></polyline>
            </svg>
        </button>

        <!-- Title -->
        <h1 style="flex: 1; text-align: center; font-size: var(--font-size-h1); font-weight: var(--font-weight-medium); color: var(--color-text-primary); margin: 0;">书源管理</h1>

        <!-- Right actions -->
        <div style="display: flex; align-items: center; gap: var(--space-md);">
            <button style="font-size: var(--font-size-body); color: var(--color-primary); background: none; border: none; cursor: pointer; padding: 4px;">导入</button>
            <button style="font-size: var(--font-size-body); color: var(--color-primary); background: none; border: none; cursor: pointer; padding: 4px;">新增</button>
        </div>
    </nav>

    <!-- Source List -->
    <main style="padding: var(--space-lg); display: flex; flex-direction: column; gap: var(--space-md);">

        <!-- Source Card 1: Active -->
        <div class="source-card">
            <!-- Top row -->
            <div style="display: flex; align-items: center; justify-content: space-between;">
                <span style="font-size: var(--font-size-h2); font-weight: var(--font-weight-medium); color: var(--color-text-primary);">示例书源1</span>
                <div style="display: flex; align-items: center; gap: var(--space-sm);">
                    <!-- Green checkmark -->
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" style="color: var(--color-primary);">
                        <circle cx="8" cy="8" r="8" fill="var(--color-primary)" opacity="0.15"/>
                        <polyline points="4.5,8.5 7,11 11.5,5.5" stroke="var(--color-primary)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                    </svg>
                    <!-- Toggle ON -->
                    <label class="toggle-switch">
                        <input type="checkbox" checked>
                        <span class="toggle-slider"></span>
                    </label>
                </div>
            </div>
            <!-- Bottom row: URL -->
            <p style="font-size: var(--font-size-caption); color: var(--color-text-tertiary); margin-top: var(--space-sm); margin-bottom: 0;">https://example.com</p>
        </div>

        <!-- Source Card 2: Disabled -->
        <div class="source-card">
            <!-- Top row -->
            <div style="display: flex; align-items: center; justify-content: space-between;">
                <span style="font-size: var(--font-size-h2); font-weight: var(--font-weight-medium); color: var(--color-text-primary);">示例书源2</span>
                <div style="display: flex; align-items: center; gap: var(--space-sm);">
                    <!-- Gray checkmark -->
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" style="color: var(--color-text-placeholder);">
                        <circle cx="8" cy="8" r="8" fill="var(--color-text-placeholder)" opacity="0.15"/>
                        <polyline points="4.5,8.5 7,11 11.5,5.5" stroke="var(--color-text-placeholder)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                    </svg>
                    <!-- Toggle OFF -->
                    <label class="toggle-switch">
                        <input type="checkbox">
                        <span class="toggle-slider"></span>
                    </label>
                </div>
            </div>
            <!-- Bottom row: URL -->
            <p style="font-size: var(--font-size-caption); color: var(--color-text-tertiary); margin-top: var(--space-sm); margin-bottom: 0;">https://example2.com</p>
        </div>

        <!-- Source Card 3: Expired/Failed -->
        <div class="source-card">
            <!-- Top row -->
            <div style="display: flex; align-items: center; justify-content: space-between;">
                <span style="font-size: var(--font-size-h2); font-weight: var(--font-weight-medium); color: var(--color-text-primary);">示例书源3</span>
                <div style="display: flex; align-items: center; gap: var(--space-sm);">
                    <!-- Red expired tag (pill) -->
                    <span style="font-size: var(--font-size-caption); color: var(--state-error); background: rgba(231, 76, 60, 0.1); padding: 2px 8px; border-radius: 10px; line-height: 1.4; font-weight: var(--font-weight-medium);">已失效</span>
                    <!-- Toggle OFF -->
                    <label class="toggle-switch">
                        <input type="checkbox">
                        <span class="toggle-slider"></span>
                    </label>
                </div>
            </div>
            <!-- Bottom row: URL -->
            <p style="font-size: var(--font-size-caption); color: var(--color-text-tertiary); margin-top: var(--space-sm); margin-bottom: 0;">https://bad.com</p>
        </div>

        <!-- Bottom Summary -->
        <p style="text-align: center; font-size: var(--font-size-caption); color: var(--color-text-tertiary); margin-top: var(--space-xl); margin-bottom: var(--space-xxl);">共 3 个书源，已启用 2 个</p>

    </main>

    <script>lucide.createIcons();</script>

    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }

      /* iOS-style toggle switch */
      .toggle-switch {
        position: relative;
        width: 44px;
        height: 26px;
        flex-shrink: 0;
      }
      .toggle-switch input {
        opacity: 0;
        width: 0;
        height: 0;
        position: absolute;
      }
      .toggle-slider {
        position: absolute;
        inset: 0;
        background-color: var(--color-text-placeholder);
        border-radius: 13px;
        cursor: pointer;
        transition: background-color 200ms cubic-bezier(.2,.8,.2,1);
      }
      .toggle-slider::before {
        content: '';
        position: absolute;
        top: 2px;
        left: 2px;
        width: 22px;
        height: 22px;
        background-color: #FFFFFF;
        border-radius: 50%;
        transition: transform 200ms cubic-bezier(.2,.8,.2,1);
        box-shadow: 0 1px 2px rgba(0,0,0,0.15);
      }
      .toggle-switch input:checked + .toggle-slider {
        background-color: var(--color-primary);
      }
      .toggle-switch input:checked + .toggle-slider::before {
        transform: translateX(18px);
      }

      /* Source card */
      .source-card {
        background: var(--color-bg-card);
        border-radius: var(--radius-lg);
        padding: var(--space-lg);
        position: relative;
      }
    </style>
</body>
</html>
