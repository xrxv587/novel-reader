<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>功能</title>
    <style id="theme-vars">
:root {
  /* === Color System === */
  --color-primary: #2E7D5B;
  --color-primary-light: #E8F5EE;
  --color-text-primary: #2D2D2D;
  --color-text-secondary: #666666;
  --color-text-tertiary: #999999;
  --color-text-placeholder: #B2B2B2;
  --color-bg-page: #F5F5F5;
  --color-bg-card: #FFFFFF;
  --color-border: #EDEDED;

  /* Reading theme backgrounds */
  --reading-bg-default: #F6F2E9;
  --reading-text-default: #3E3B32;
  --reading-bg-white: #FFFFFF;
  --reading-text-white: #2D2D2D;
  --reading-bg-green: #CCE8CF;
  --reading-text-green: #2D5A32;
  --reading-bg-dark: #1A1A1A;
  --reading-text-dark: #999999;
  --reading-bg-parchment: #F0E6D3;
  --reading-text-parchment: #5C4B32;

  /* Functional colors */
  --state-error: #E74C3C;
  --state-warning: #F39C12;
  --state-success: #27AE60;

  /* === Typography === */
  --font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", "Microsoft YaHei", sans-serif;
  --font-size-display: 20px;
  --font-size-h1: 17px;
  --font-size-h2: 15px;
  --font-size-body: 14px;
  --font-size-caption: 12px;
  --font-size-reading: 18px;
  --line-height-display: 28px;
  --line-height-h1: 24px;
  --line-height-h2: 22px;
  --line-height-body: 20px;
  --line-height-caption: 17px;
  --line-height-reading: 1.75;
  --font-weight-medium: 500;
  --font-weight-regular: 400;

  /* === Spacing === */
  --space-xs: 4px;
  --space-sm: 8px;
  --space-md: 12px;
  --space-lg: 16px;
  --space-xl: 24px;
  --space-xxl: 32px;

  /* === Border Radius === */
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-full: 50%;

  /* === Shadows === */
  --shadow-card: 0 2px 8px rgba(0, 0, 0, 0.08);
  --shadow-float: 0 4px 16px rgba(0, 0, 0, 0.12);
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-primary: var(--color-primary);
    --color-border: var(--color-border);
  }
  @layer base {
    body { background: var(--color-background); color: var(--color-text-primary); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body>
    <!-- Top Navigation Bar -->
    <nav class="nav-bar">
        <span class="nav-title">功能</span>
    </nav>

    <main>
        <!-- Grouped List -->
        <div class="grouped-list-wrapper">

            <!-- Group 1: 导入 -->
            <div class="list-group">
                <button class="list-item" type="button">
                    <span class="item-icon">
                        <!-- book-import icon -->
                        <svg class="icon-svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"></path>
                            <path d="M12 14V8"></path>
                            <path d="M9 11l3-3 3 3"></path>
                        </svg>
                    </span>
                    <span class="item-title">导入本地书籍</span>
                    <span class="item-arrow">
                        <svg class="icon-svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="9 18 15 12 9 6"></polyline>
                        </svg>
                    </span>
                </button>
                <button class="list-item" type="button" data-dom-id="feature-search">
                    <span class="item-icon">
                        <!-- search icon -->
                        <svg class="icon-svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8"></circle>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        </svg>
                    </span>
                    <span class="item-title">联网搜索书源</span>
                    <span class="item-arrow">
                        <svg class="icon-svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="9 18 15 12 9 6"></polyline>
                        </svg>
                    </span>
                </button>
            </div>

            <!-- Group 2: 书源 -->
            <div class="list-group">
                <button class="list-item" type="button" data-dom-id="feature-source">
                    <span class="item-icon">
                        <!-- source/bookshelf icon -->
                        <svg class="icon-svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
                            <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
                        </svg>
                    </span>
                    <span class="item-title">书源管理</span>
                    <span class="item-arrow">
                        <svg class="icon-svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="9 18 15 12 9 6"></polyline>
                        </svg>
                    </span>
                </button>
            </div>

            <!-- Group 3: 阅读辅助 -->
            <div class="list-group">
                <button class="list-item" type="button">
                    <span class="item-icon">
                        <!-- bookmark icon -->
                        <svg class="icon-svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path>
                        </svg>
                    </span>
                    <span class="item-title">我的书签</span>
                    <span class="item-arrow">
                        <svg class="icon-svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="9 18 15 12 9 6"></polyline>
                        </svg>
                    </span>
                </button>
                <button class="list-item" type="button">
                    <span class="item-icon">
                        <!-- settings/Aa icon -->
                        <svg class="icon-svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"></circle>
                            <path d="M12 6v2"></path>
                            <path d="M12 16v2"></path>
                            <path d="M6.93 6.93l1.41 1.41"></path>
                            <path d="M15.66 15.66l1.41 1.41"></path>
                            <path d="M6 12h2"></path>
                            <path d="M16 12h2"></path>
                        </svg>
                    </span>
                    <span class="item-title">阅读设置</span>
                    <span class="item-arrow">
                        <svg class="icon-svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="9 18 15 12 9 6"></polyline>
                        </svg>
                    </span>
                </button>
            </div>

            <!-- Group 4: 其他 -->
            <div class="list-group">
                <button class="list-item" type="button">
                    <span class="item-icon">
                        <!-- info icon -->
                        <svg class="icon-svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"></circle>
                            <line x1="12" y1="16" x2="12" y2="12"></line>
                            <line x1="12" y1="8" x2="12.01" y2="8"></line>
                        </svg>
                    </span>
                    <span class="item-title">关于</span>
                    <span class="item-arrow">
                        <svg class="icon-svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="9 18 15 12 9 6"></polyline>
                        </svg>
                    </span>
                </button>
            </div>

        </div>
    </main>

    <!-- Bottom Tab Bar -->
    <div class="tab-bar">
        <button class="tab-item inactive" type="button" aria-label="书架" data-dom-id="tab-bookshelf">
            <span class="tab-icon">
                <svg class="icon-svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"></path>
                </svg>
            </span>
            <span class="tab-label">书架</span>
        </button>
        <button class="tab-item active" type="button" aria-label="功能">
            <span class="tab-icon">
                <svg class="icon-svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                </svg>
            </span>
            <span class="tab-label">功能</span>
        </button>
    </div>

    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

      /* === Page-specific styles === */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      html {
        font-size: 16px;
      }

      body {
        font-family: var(--font-family);
        background-color: var(--color-bg-page);
        color: var(--color-text-primary);
        width: 375px;
        min-height: 100vh;
        overflow-x: hidden;
        overflow-y: auto;
        -webkit-font-smoothing: antialiased;
      }

      /* Top Navigation Bar */
      .nav-bar {
        position: sticky;
        top: 0;
        z-index: 10;
        height: 44px;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0 var(--space-lg);
        background-color: var(--color-bg-page);
      }

      .nav-bar .nav-title {
        font-size: 17px;
        font-weight: 500;
        color: var(--color-text-primary);
        line-height: 1;
        letter-spacing: -0.01em;
      }

      /* Grouped List */
      .grouped-list-wrapper {
        padding: var(--space-lg) 0;
        padding-bottom: calc(var(--space-lg) * 2 + 49px + env(safe-area-inset-bottom, 20px));
        display: flex;
        flex-direction: column;
        gap: var(--space-lg);
      }

      .list-group {
        margin: 0 var(--space-lg);
        background-color: var(--color-bg-card);
        border-radius: var(--radius-lg);
        overflow: hidden;
      }

      .list-item {
        display: flex;
        align-items: center;
        height: 48px;
        padding: 0 var(--space-lg);
        gap: var(--space-md);
        cursor: pointer;
        -webkit-user-select: none;
        user-select: none;
        position: relative;
        background: none;
        border: none;
        width: 100%;
        text-align: left;
        font-family: inherit;
        font-size: inherit;
        color: inherit;
      }

      .list-item:active {
        background-color: var(--color-primary-light);
      }

      .list-item + .list-item::before {
        content: '';
        position: absolute;
        top: 0;
        left: 56px;
        right: 0;
        height: 1px;
        background-color: var(--color-border);
      }

      .list-item .item-icon {
        width: 24px;
        height: 24px;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--color-primary);
      }

      .list-item .item-icon svg {
        display: block;
      }

      .list-item .item-title {
        flex: 1;
        font-size: 15px;
        font-weight: var(--font-weight-regular);
        color: var(--color-text-primary);
        line-height: 1;
      }

      .list-item .item-arrow {
        width: 16px;
        height: 16px;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--color-text-tertiary);
      }

      .list-item .item-arrow svg {
        display: block;
      }

      /* Bottom Tab Bar */
      .tab-bar {
        position: fixed;
        bottom: 0;
        left: 0;
        width: 375px;
        z-index: 20;
        background-color: var(--color-bg-card);
        border-top: 1px solid var(--color-border);
        display: flex;
        align-items: flex-start;
        padding-top: 6px;
        padding-bottom: calc(6px + env(safe-area-inset-bottom, 0px));
      }

      .tab-item {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 2px;
        background: none;
        border: none;
        cursor: pointer;
        padding: 0;
        -webkit-user-select: none;
        user-select: none;
        text-decoration: none;
      }

      .tab-item .tab-icon {
        width: 24px;
        height: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .tab-item .tab-label {
        font-size: 10px;
        line-height: 1.2;
        font-weight: var(--font-weight-regular);
      }

      .tab-item.active {
        color: var(--color-primary);
      }

      .tab-item.inactive {
        color: var(--color-text-tertiary);
      }

      .icon-svg {
        display: block;
      }
    </style>
</body>
</html>
