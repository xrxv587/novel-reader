<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>搜索 - 小说阅读器</title>
    <style id="theme-vars">
:root {
  /* === Color System === */
  --color-primary: #2E7D5B;
  --color-primary-light: #E8F5EE;
  --color-text-primary: #2D2D2D;
  --color-text-secondary: #666666;
  --color-text-tertiary: #999999;
  --color-text-placeholder: #B2B2B2;
  --color-bg-page: #F5F5F5;
  --color-bg-card: #FFFFFF;
  --color-border: #EDEDED;

  /* Reading theme backgrounds */
  --reading-bg-default: #F6F2E9;
  --reading-text-default: #3E3B32;
  --reading-bg-white: #FFFFFF;
  --reading-text-white: #2D2D2D;
  --reading-bg-green: #CCE8CF;
  --reading-text-green: #2D5A32;
  --reading-bg-dark: #1A1A1A;
  --reading-text-dark: #999999;
  --reading-bg-parchment: #F0E6D3;
  --reading-text-parchment: #5C4B32;

  /* Functional colors */
  --state-error: #E74C3C;
  --state-warning: #F39C12;
  --state-success: #27AE60;

  /* === Typography === */
  --font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", "Microsoft YaHei", sans-serif;
  --font-size-display: 20px;
  --font-size-h1: 17px;
  --font-size-h2: 15px;
  --font-size-body: 14px;
  --font-size-caption: 12px;
  --font-size-reading: 18px;
  --line-height-display: 28px;
  --line-height-h1: 24px;
  --line-height-h2: 22px;
  --line-height-body: 20px;
  --line-height-caption: 17px;
  --line-height-reading: 1.75;
  --font-weight-medium: 500;
  --font-weight-regular: 400;

  /* === Spacing === */
  --space-xs: 4px;
  --space-sm: 8px;
  --space-md: 12px;
  --space-lg: 16px;
  --space-xl: 24px;
  --space-xxl: 32px;

  /* === Border Radius === */
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-full: 50%;

  /* === Shadows === */
  --shadow-card: 0 2px 8px rgba(0, 0, 0, 0.08);
  --shadow-float: 0 4px 16px rgba(0, 0, 0, 0.12);
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-primary: var(--color-primary);
    --color-border: var(--color-border);
  }
  @layer base {
    body { background: var(--color-background); color: var(--color-text-primary); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body>
    <main>
        <!-- Search Bar (sticky top) -->
        <div class="search-bar">
            <button class="back-btn" data-dom-id="search-back" aria-label="返回">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
            </button>
            <div class="search-input-wrap">
                <span class="search-icon">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                </span>
                <input type="text" placeholder="搜索书籍..." value="斗破" autofocus />
            </div>
        </div>

        <!-- Search Status -->
        <div class="search-status">
            <div class="spinner"></div>
            <span>正在搜索...</span>
        </div>

        <!-- Results Group 1: 书源A -->
        <div class="result-group">
            <div class="result-group-header">书源A（3条结果）</div>

            <div class="result-card" data-dom-id="result-sourceA-1">
                <div class="book-title">《斗破苍穹》</div>
                <div class="book-author">天蚕土豆 · 著</div>
                <div class="book-latest">最新章节：第1648章 大结局</div>
            </div>

            <div class="result-card" data-dom-id="result-sourceA-2">
                <div class="book-title">《斗破苍穹之无尽火域》</div>
                <div class="book-author">无名 · 著</div>
                <div class="book-latest">最新章节：第256章</div>
            </div>

            <div class="result-card" data-dom-id="result-sourceA-3">
                <div class="book-title">《从斗破开始》</div>
                <div class="book-author">小白 · 著</div>
                <div class="book-latest">最新章节：第89章</div>
            </div>
        </div>

        <!-- Results Group 2: 书源B -->
        <div class="result-group">
            <div class="result-group-header">书源B（2条结果）</div>

            <div class="result-card" data-dom-id="result-sourceB-1">
                <div class="book-title">《斗破苍穹》</div>
                <div class="book-author">天蚕土豆 · 著</div>
                <div class="book-latest">最新章节：第1648章</div>
            </div>

            <div class="result-card" data-dom-id="result-sourceB-2">
                <div class="book-title">《斗破苍穹续集》</div>
                <div class="book-author">同人 · 著</div>
                <div class="book-latest">最新章节：第100章</div>
            </div>
        </div>

        <!-- Error Message -->
        <div class="error-message">
            书源C请求失败，已跳过
        </div>

        <!-- Bottom spacer -->
        <div class="page-bottom-spacer"></div>
    </main>

    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }

      /* === Search Page Styles === */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      body {
        font-family: var(--font-family);
        background: var(--color-bg-page);
        max-width: 375px;
        margin: 0 auto;
        min-height: 100vh;
        position: relative;
        overflow-x: hidden;
      }

      /* Search bar - sticky top */
      .search-bar {
        position: sticky;
        top: 0;
        z-index: 100;
        background: var(--color-bg-card);
        padding: var(--space-sm) var(--space-lg);
        display: flex;
        align-items: center;
        gap: var(--space-sm);
      }

      .search-bar .back-btn {
        flex-shrink: 0;
        width: 32px;
        height: 32px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--color-text-primary);
        cursor: pointer;
        border: none;
        background: none;
        padding: 0;
      }

      .search-bar .back-btn svg {
        width: 22px;
        height: 22px;
      }

      .search-input-wrap {
        flex: 1;
        position: relative;
      }

      .search-input-wrap input {
        width: 100%;
        height: 40px;
        background: var(--color-bg-page);
        border: none;
        border-radius: var(--radius-md);
        padding: 0 var(--space-md) 0 36px;
        font-size: var(--font-size-body);
        color: var(--color-text-primary);
        font-family: var(--font-family);
        outline: none;
      }

      .search-input-wrap input::placeholder {
        color: var(--color-text-placeholder);
      }

      .search-input-wrap .search-icon {
        position: absolute;
        left: 10px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--color-text-placeholder);
        pointer-events: none;
      }

      .search-input-wrap .search-icon svg {
        width: 16px;
        height: 16px;
      }

      /* Search status */
      .search-status {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: var(--space-xl) 0 var(--space-md);
      }

      .search-status .spinner {
        width: 16px;
        height: 16px;
        border: 2px solid var(--color-border);
        border-top-color: var(--color-text-tertiary);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      .search-status span {
        font-size: var(--font-size-caption);
        color: var(--color-text-tertiary);
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      /* Result groups */
      .result-group {
        margin-bottom: var(--space-md);
      }

      .result-group-header {
        font-size: var(--font-size-caption);
        color: var(--color-text-tertiary);
        padding: var(--space-md) var(--space-lg) var(--space-sm);
      }

      /* Result cards */
      .result-card {
        background: var(--color-bg-card);
        border-radius: var(--radius-md);
        margin: 0 var(--space-lg);
        padding: var(--space-md) var(--space-lg);
        cursor: pointer;
        transition: background 160ms cubic-bezier(.2,.8,.2,1);
      }

      .result-card + .result-card {
        margin-top: var(--space-sm);
      }

      .result-card:active {
        background: #F0F0F0;
      }

      .result-card .book-title {
        font-size: var(--font-size-h2);
        font-weight: 500;
        color: var(--color-text-primary);
        line-height: 22px;
        margin-bottom: 2px;
      }

      .result-card .book-author {
        font-size: var(--font-size-caption);
        color: var(--color-text-tertiary);
        line-height: 17px;
        margin-bottom: 2px;
      }

      .result-card .book-latest {
        font-size: var(--font-size-caption);
        color: var(--color-text-secondary);
        line-height: 17px;
      }

      /* Error message */
      .error-message {
        margin: var(--space-sm) var(--space-lg);
        padding: var(--space-sm) var(--space-lg);
        font-size: var(--font-size-caption);
        color: var(--state-error);
        font-style: italic;
        opacity: 0.85;
      }

      /* Safe area bottom padding for pushed pages */
      .page-bottom-spacer {
        height: 24px;
      }
    </style>
</body>
</html>
